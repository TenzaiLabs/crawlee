name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra test --extra dev
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.23"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen --extra test --extra dev
      - name: Check formatting
        run: uv run ruff format --check app tests scripts
      - name: Lint
        run: uv run ruff check app tests scripts
      - name: Type-check
        run: uv run ty check
      - name: Test
        run: uv run pytest -q
      - name: Check docs links
        run: uv run python scripts/check_docs_links.py
      - name: Check GitHub Actions pins
        run: uv run python scripts/check_github_actions_pins.py
