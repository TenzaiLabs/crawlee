version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    exclude-paths:
      - testsites/**
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pre-commit
    directory: /
    exclude-paths:
      - testsites/**
    schedule:
      interval: weekly
    groups:
      pre-commit-hooks:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    exclude-paths:
      - testsites/**
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns:
          - "*"
